name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: netscan

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ${{ env.BIN }}
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          bin="target/${{ matrix.target }}/release/${{ env.BIN }}"
          if [ -f "$bin.exe" ]; then bin="$bin.exe"; fi
          name="${{ env.BIN }}-${{ github.ref_name }}-${{ matrix.target }}"
          case "${{ matrix.target }}" in
            *windows*) cp "$bin" "dist/${name}.exe" ;;
            *) cp "$bin" "dist/${name}" ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -l release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
